services:
  mysql:
    image: mysql:8.0
    container_name: docagenda-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: docagenda
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
#      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
